# EMF's messages are formatted with MiniMessage.
# For help with the MiniMessage format, see the Adventure Docs: https://docs.papermc.io/adventure/minimessage/format/
# Valid Message Tags
# -s - The message will not be sent. Setting the message to "" has the same effect.
# [noPrefix] - The message will not have a prefix.
# The prefix shown in player-facing messages. Keeping the space in is recommended.
prefix-regular: '<gradient:#E6F9FF:#8FD9FB>[EvenMoreFish] '
# The prefix shown in admin commands.
prefix-admin: '<gradient:#FFECEC:#FF5555>[EvenMoreFish] '
# The prefix shown when errors occur e.g. no permission to run a command.
prefix-error: '<gradient:#FFECEC:#FF5555>[EvenMoreFish] '
# Sent to players when they catch a fish with a length.
fish-caught: <white><b>{player}</b> has fished a {length}cm <b>{rarity}</b> {fish}!
# Sent to players when they catch a fish without a length.
lengthless-fish-caught: <white><b>{player}</b> has fished a <b>{rarity}</b> {fish}!
# Sent to players when they hunt a fish with a length.
fish-hunted: <white><b>{player}</b> has hunted a {length}cm <b>{rarity}</b> {fish}!
# Sent to players when they hunt a fish without a length.
lengthless-fish-hunted: <white><b>{player}</b> has hunted a <b>{rarity}</b> {fish}!
# Sent to a player when they don't have permission to execute a command.
no-permission: <red>このコマンドを実行する権限がありません。
# Sent when a competition starts.
contest-start: <reset>釣り大会（{type}）が開催されました。
# Sent when a competition ends.
contest-end: <reset>釣り大会が終了しました。
# Sent when a player joins while a competition is active.
contest-join: <reset>釣り大会（{type}）に参加しました。
# Sent when a new player takes the #1 spot in a competition.
new-first: <reset>{player} が１位になりました。
# Should this message appear in chat (false) or above the exp bar (true)
action-bar-message: true
# What competition types should the action bar be used for? (recommended: MOST_FISH)
action-bar-types:
- MOST_FISH
# What should replace the {type} variable for each competition type?
competition-types:
  # MOST_FISH
  most: 魚の数
  # LARGEST_FISH
  largest: 魚の大きさ
  # LARGEST_TOTAL_FISH
  largest-total: 魚の大きさの合計
  # SHORTEST_FISH
  shortest: the shortest fish
  # SHORTEST_TOTAL_FISH
  shortest-total: the shortest total fish length
  # SPECIFIC_FISH
  specific: '{amount} {rarity_colour}<bold>{rarity}</bold> {rarity_colour}{fish}<reset>'
  # SPECIFIC_RARITY
  specific-rarity: '{amount} {rarity_colour}<bold>{rarity}<reset> の魚'
# Segments shown in the bossbar when competitions run
bossbar:
  # {prefix} is defined inside the competition files.
  # {time-formatted} is the remaining time, formatted using the values under the "duration" key.
  # {remaining} is defined below
  layout: '{prefix}<reset>{time-formatted}<reset>{remaining}'
  # For translating the "left" at the end e.g. "5s left" -> "5s kvar"
  remaining: で終了
# Formatting for time duration.
duration:
  day: <white>{day}d
  hour: <white>{hour}h
  minute: <white>{minute}m
  second: <white>{second}s
# This is the format of the lore given to fish when they're caught.
# {custom-lore} is specified in the fish configs under the lore: section, if the fish has a lore, the lore's lines will
# replace the {fish_lore}, however if it's empty the line will be removed. DO NOT ADD ANYTHING OTHER THAN THIS VARIABLE
# TO THAT LINE.
fish-lore:
- '{fisherman_lore}'
- '{length_lore}'
- ''
- '{fish_lore}'
- '{rarity_colour}<bold>{rarity}'
# Sets what to replace with the {fisherman_lore} or {length_lore} with above ^
fisherman-lore:
- <white>{player} によって釣られた
length-lore:
- <white>長さ {length}cm
# The format of the leaderboard after a competition is over
leaderboard:
  largest-fish: <white>#{position} | {player} (<b>{rarity}</b> {fish}, {length}cm)
  largest-total: <white>#{position} | {player} <white>({amount}cm<white>)
  most-fish: <white>#{position} | {player} <white>({amount} <white>fish)
  shortest-fish: <white>#{position} | {player} <white>(<b>{rarity}</b> {fish}<white>, {length}cm<white>)
  shortest-total: <white>#{position} | {player} <white>({amount}cm<white>)
  # Sent when a competition only has a single winner, in place of the leaderboard.
  single-winner: <white>{player} has won the competition for {type}. Congratulations!
  # This shows the number of players currently in the competition, set to "" to disable.
  total-players: <white>There are a total of {amount} player(s) in the leaderboard.
  # The number of positions shown in the leaderboard - can't be less than 1.
  leaderboard-count: 5
  # Sent to players when nobody got a record during a competition
  no-winners: <white>There were no fishing records.
  # When an individual player didn't get a record
  no-record: <white>You didn't catch any fish.
# Sent when an admin tries to start a competition where the type doesn't exist.
invalid-type: <white>That isn't a valid competition type. Click <click:open_url:'https://evenmorefish.github.io/EvenMoreFish/docs/features/competitions/types'><u>here</u></click> for available types.
# Sent to all online players when not enough players are on to start a competition
not-enough-players: <white>There are not enough players online to start the scheduled fishing competition.
# Sent to all players at specific times to show the remaining time left
# {time_formatted} shows the time (e.g. 5m left, 10m 30s left)
# {time_raw} is the amount of seconds remaining
time-alert: <reset>釣り大会（{type}）終了まで残りあと {time_formatted}
# The message sent to players when they've sold their fish in the /emf shop
fish-sale: <green>{sell-price} <reset>で </green><green>{amount} <reset>匹の魚を売りました。
# The message sent to players when they attempt to sell and there are no sellable fish
no-sellable-fish: <white>You have nothing to sell!
# Help messages
# General help (/emf help) - Commands locked behind permissions will not show for players.
help-format: '[noPrefix]<aqua>{command} <yellow>- <white>{description}'
help-general:
  title: '[noPrefix]<gradient:#f1ffed:#73ff6b><st>         </st> <b><gradient:#E6F9FF:#8FD9FB>EvenMoreFish </b><st><gradient:#73ff6b:#f1ffed>         '
  top: '[noPrefix]Shows an ongoing competition''s leaderboard.'
  help: '[noPrefix]Shows you this page.'
  shop: '[noPrefix]Opens a shop to sell your fish.'
  toggle: '[noPrefix]Toggles various features of the plugin.'
  gui: '[noPrefix]Opens the Main Menu GUI.'
  admin: '[noPrefix]Admin command help page.'
  sellall: '[noPrefix]Sell all the fish in your inventory.'
  next: '[noPrefix]Shows when the next competition will start.'
  applybaits: '[noPrefix]Apply baits to your fishing rod.'
  journal: '[noPrefix]View a journal of caught fish and their stats.'
help-list:
  fish: '[noPrefix]Display all fish in a specific rarity.'
  rarities: '[noPrefix]Display all rarities.'
# Competition help (/emf admin competition help)
help-competition:
  start: '[noPrefix]Starts a configured competition.'
  end: '[noPrefix]Ends the current competition.'
  test: '[noPrefix]Allows testing a competition with the chosen type.'
  extend: '[noPrefix]Extends the active competition by the chosen duration.'
# Admin help (/emf admin help)
help-admin:
  bait: '[noPrefix]Gives baits to a player.'
  competition: '[noPrefix]Starts or stops a competition'
  clearbaits: '[noPrefix]Removes all applied baits from a fishing rod.'
  fish: '[noPrefix]Gives a fish to a player.'
  nbt-rod: '[noPrefix]Gives a custom NBT rod to a player required for catching EMF fish.'
  custom-rod: '[noPrefix]Gives a custom fishing rod to a player.'
  reload: '[noPrefix]Reloads the plugin''s config files.'
  migrate: '[noPrefix]Migrate the database from Legacy (V2) to V3'
  addons: '[noPrefix]Display all addons.'
  version: '[noPrefix]Displays plugin information.'
  rawitem: '[noPrefix]Displays the item in your main hand as raw NBT.'
  database: '[noPrefix]Manage the plugin''s database.'
# Shown when the %emf_competition_place_player_*% placeholder requests a position in the leaderboard that doesn't exist
no-player-in-place: <white>Start fishing to take this place
# Shown when the %emf_competition_place_fish_*% placeholder requests a position in the leaderboard that doesn't exist
no-fish-in-place: <white>Start fishing to take this place
# Shown when the %emf_competition_place_size_*% placeholder requests a position in the leaderboard that doesn't exist
no-size-in-place: <white>Start fishing to take this place
# Shown when the %emf_competition_place_player_*% placeholder is used when there's no competition running
no-competition-running: <white>No competition running right now.
# Shown when the %emf_competition_place_fish_*% placeholder is used when there's no competition running
no-competition-running-fish: <white>No competition running right now.
# Shown when the %emf_competition_place_size_*% placeholder is used when there's no competition running
no-competition-running-size: <white>No competition running right now.
# Shown in %emf_competition_time_left% when there are no scheduled competitions.
no-competitions-scheduled: <white>No competitions are scheduled.
# Broadcasted to all players when a competition is extended.
competition-time-extended: <white>The active competition has been extended by {duration}!
# How should %emf_custom_fishing_status% be formatted?
custom-fishing-enabled: <green>Enabled
custom-fishing-disabled: <red>Disabled
# How should the %emf_competition_place_fish_*% placeholder be formatted when the fish has length?
emf-competition-fish-format: <white>{length}cm <b>{rarity}</b> {fish}
# How should the %emf_competition_place_fish_*% placeholder be formatted when the fish has no length?
emf-lengthless-fish-format: <white><b>{rarity}</b> {fish}
# How should %emf_competition_place_fish_*% be formatted during MOST/SPECIFIC_FISH competitions?
emf-most-fish-format: <white>{amount} fish
# What should be displayed for %emf_competition_place_size_*% during the MOST_FISH competition?
emf-size-during-most-fish: N/A
# How the %emf_competition_time_left% placeholder should be formatted.
emf-time-remaining:
  # When there is not an active competition.
  inactive: '<white>Time left until next competition: {days}d, {hours}h, {minutes}m.'
  # When there is an active competition.
  active: '<white>Time left in competition: {time-left}'
# Sent when a player tries to apply too many types of baits to a fishing rod, set in the general section of baits.yml
max-baits-reached: <white>You have reached the maximum number of unique baits for this fishing rod.
# Not to be confused with the above, this is sent when the maximum of a specific bait is reached. Define this in baits.yml using "max-baits".
max-bait-reached: <white>You have reached the maximum number of {bait} <white>on this fishing rod.
# Sent when a player catches a bait from fishing
bait-catch: <reset><bold>{player} <reset>は [餌] {bait_theme}<bold>{bait} <reset>を釣り上げました！
# Sent when a bait is applied and a fish is caught.
bait-use: <reset>釣り竿の [餌] {bait_theme}<bold>{bait} <reset>の１つを使用しました。
# Sent when someone tries to use a bait in creative
bait-survival-limited: <reset>釣り竿に餌を適用するには、<underlined>サバイバルモード <reset>である必要があります。
# Sent when someone tries to merge a baited rod into an unbaited rod
bait-rod-protection: <white>Protected your baited fishing rod. If you are trying to repair it, please put it in the first slot instead.
# Sent when someone tries to apply a bait to a fishing rod they cannot use to fish
bait-invalid-rod: <white>You cannot apply bait to this fishing rod!
# Sent when a bait is purchased from the menu.
bait-purchased: <white>You have purchased {amount}x {bait} for {price}.
# Sent when a player attempts to purchase a bait, asking them to confirm.
bait-confirm-purchase: <white>Click again within 5 seconds to confirm bait purchase.
# Sent when a player attempts to purchase a bait they cannot afford.
bait-cannot-afford: <white>You cannot afford to purchase that bait. You need {price}.
# Sent when a player attempts to purchase a bait that is not for sale.
bait-not-for-sale: <white>That bait is not for sale.
toggle:
  fishing:
    no-permission: <white>You cannot toggle custom fish.
    off: <white>You will no longer catch custom fish.
    on: <white>You will now catch custom fish.
  bossbar:
    no-permission: <white>You cannot toggle competition bossbars.
    off: <white>You will no longer see competition bossbars.
    on: <white>You will now see competition bossbars.
  catch-message:
    no-permission: <white>You cannot toggle catch messages.
    off: <white>You will no longer see catch messages.
    on: <white>You will now see catch messages.
admin:
  # Opens an /emf shop for another player
  open-fish-shop: <reset>{player} のショップイベントリを開きました。
  # When a fish is given to a player
  given-player-fish: <reset>{player} に {fish} を与えました。
  # When a bait is given to a player
  given-player-bait: <reset>{player} に {bait} を与えました。
  # When an admin runs /emf admin bait without a bait name.
  no-bait-specified: <reset>特定の餌の名前を入力してください。
  # When the admin tries the command /emf admin clearbaits whe not holding a fishing rod.
  must-be-holding-rod: <reset>このコマンドを実行するには、釣り竿を持っている必要があります。
  # When /emf admin clearbaits command is run.
  all-baits-cleared: <reset>{amount}個 の餌を、釣り竿から全て削除しました。
  # /emf admin clearbaits is run, but there are no baits on the rod.
  no-baits-on-rod: <reset>この釣り竿には餌が適用されていません。
  # When economy is disabled for the plugin
  economy-disabled: <reset>EvenMoreFish の経済機能が無効化されました。
  # When the specified player can't be found .
  player-not-found: <reset>プレイヤー {player} が見つかりませんでした。
  # When the specified number is not a number.
  number-format-error: <reset>{amount} は無効な数値です。
  # When the specified number in item quantity is too large.
  number-range-error: <reset>{amount} は１～６４の数値ではありません。
  # When a command cannot be run from the console.
  cannot-run-on-console: <reset>コマンドはコンソールから実行できません。
  # Sent when a competition is already running when using /emf admin competition start
  competition-already-running: <reset>すでに釣り大会が開催されています。
  # When an invalid competition type is provided
  competition-type-invalid: <white>That isn't a valid competition type. Click <click:open_url:'https://evenmorefish.github.io/EvenMoreFish/docs/features/competitions/types'><u>here</u></click> for available types.
  # When an invalid competition id is provided
  competition-id-invalid: <white>That isn't a valid competition id.
  # When the command /emf admin custom-rod is run.
  custom-rod-given: <white>You have given {player} a custom fishing rod.
  # When there's a modrinth update available, don't translate the URL otherwise it won't direct to the correct page.
  update-available: '<reset>利用可能なアップデートがあります: https://modrinth.com/plugin/evenmorefish/versions?l=paper'
  # When the plugin is reloaded
  reload: <reset>プラグインのリロードが完了しました。
  # When checking a list of registered addons. The actual list is added to the end of this message.
  list-addons: '<white>Registered {addon-type}s: '
# When an invalid rarity is provided for a command.
rarity-invalid: <white>That is not a valid rarity!
# When the player can't access the Fishing Journal
journal-disabled: <white>The Fishing Journal is not accessible. Please enable the plugin's database.
# Reward messages
reward:
  catch-up: <white>You received rewards while you were offline. Delivering them now.
# Bait messages
bait:
  # How the lore should look ({baits} is a multi-line variable)
  rod-lore:
  - <white>
  - '<gray>Bait Slots: <yellow>({current_baits}/{max_baits})'
  - <white>
  - '{baits}'
  - <white>
  # The default lore of the bait, changing this will not modify existing baits, but any new baits will have this format.
  bait-lore:
  - <white>
  - 'Increases the catch rates for:'
  - '{boosts}'
  - '{lore}'
  - <white>
  - <#dadada>Drop onto a fishing rod to apply,
  - <#dadada>or hold <u>SHIFT</u> to apply all.
  - <white>
  # How the baits should look in each line of the {baits} variable above ^. {baits} respects the display name setting,
  # the <gold> is there for baits without a display name set.
  baits: <gold>► {amount} {bait}
  # These are listed in the {boosts} variable above in bait-lore
  # boost-rarity/rarities: shown when the bait only impacts 1 rarity or when it impacts multiple rarities.
  # boost-fish: shown when the bait impacts some fish individually.
  boosts-rarity: ► <white>1 Rarity
  boosts-rarities: ► <white>{amount} Rarities
  boosts-fish: ► <white>{amount} Fish
  # This is added to the lore in place of a bait if show-unused-slots is enabled in the general section.
  unused-slot: <gray>► ? <i>Available Slot
exploits:
  afk-fishing:
    # When AFK Fishing is detected. This is sent on the final fish before the limit.
    detected: <white>There are no more fish in this area. Try moving your hook at least {range} blocks away.
    # When AFK Fishing is blocked.
    blocked: <white>There are no more fish in this area. Try moving your hook at least {range} blocks away.
# ATTENTION ATTENTION ATTENTION
# DO NOT EDIT THIS VALUE OR THINGS WILL BREAK!!!
version: 15
