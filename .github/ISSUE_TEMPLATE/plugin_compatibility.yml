name: Plugin compatibility
description: Pluginの導入・互換性検証結果を共有します。Security報告はSECURITY.mdを確認してください。
title: "[Plugin compatibility]: "
labels:
  - plugin-compatibility
body:
  - type: input
    id: plugin_name
    attributes:
      label: Plugin名
    validations:
      required: true

  - type: input
    id: official_source
    attributes:
      label: 公式配布元
      description: Plugin作者の公式Documentationまたは公式配布ページのURLを記載してください。
      placeholder: https://
    validations:
      required: true

  - type: input
    id: plugin_version
    attributes:
      label: Plugin Version
    validations:
      required: true

  - type: dropdown
    id: server
    attributes:
      label: 対象Server
      multiple: true
      options:
        - Velocity
        - Lobby
        - Main
        - Frontier
    validations:
      required: true

  - type: input
    id: minecraft_version
    attributes:
      label: Minecraft Version
    validations:
      required: true

  - type: input
    id: java_version
    attributes:
      label: Java Version
    validations:
      required: true

  - type: textarea
    id: installation_result
    attributes:
      label: 導入結果
      description: 起動、接続、主要機能および停止時の結果を記載してください。
    validations:
      required: true

  - type: textarea
    id: conflicts
    attributes:
      label: 競合Plugin
      description: 競合または関連するPluginとVersionを記載してください。なければ「なし」としてください。
    validations:
      required: true

  - type: textarea
    id: errors_warnings
    attributes:
      label: ERROR／WARNING
      description: 秘密情報を除去し、必要部分だけを記載してください。なければ「なし」としてください。
      render: text
    validations:
      required: true

  - type: dropdown
    id: verdict
    attributes:
      label: 判定
      options:
        - 対応
        - 条件付き対応
        - 非対応
        - 未確認
    validations:
      required: true

  - type: textarea
    id: verification
    attributes:
      label: 検証手順
      description: 他の利用者が再現できる手順と確認項目を記載してください。
    validations:
      required: true
