# Project Wayfarer Ver.0.0.5
# Verify exact releases immediately before download.
# JARs, paid plugins, and paid content are obtained manually from official sources.

core_binaries:
  - name: Velocity
    target: velocity/
    required: true
    source: https://papermc.io/downloads/velocity
  - name: Paper 26.2
    target: servers/lobby/paper.jar and servers/main/paper.jar
    required: true
    java: 25
    source: https://papermc.io/downloads/paper
  - name: Paper 1.21.11
    target: servers/frontier/paper.jar
    required: true
    java: 25
    source: https://papermc.io/downloads/paper

planned_unplaced:
  - name: CoreProtect
    version: unselected
    status: planned-not-installed
    purpose: Record block history for investigation and Admin-only partial rollback before substantial Hub/Gate construction
    placement: separate-approved-task
    database-policy: separate-approved-task
    administration: admin-only-no-builder-rollback
    cold-backup-replacement: false
    jar: manual-acquisition-after-version-selection
  - name: Persistent Nether/End Structure Expansion
    phase: 2B
    status: planned-not-selected-or-installed
    purpose: Complement the existing 103 Default Structures Nether/End baseline with approved dimension-focused content
    order: after-coreprotect-before-playable-frontier-theme
    preferred-integration: BetterStructures-compatible-content-pack
    allowed-worlds:
      - main_nether
      - main_the_end
    excluded-worlds:
      - resource
      - resource_nether
      - resource_end
      - unknown
      - lobby
      - frontier_gate
      - frontier-theme-worlds
    acquisition: separate-comparison-user-approval-and-manual-acquisition
    persistent-world-regeneration: forbidden

velocity:
  required:
    - name: LuckPerms
      version: "5.5.60"
      channel: Release
      placement: velocity
      purpose: Network permission management
      source: https://luckperms.net/download
      storage: shared-mariadb
      database: wayfarer_luckperms
      messaging: sql
      policy: The only permission plugin; replacement requires an approved migration task.
    - name: ViaVersion
      version: "5.11.0"
      channel: Release
      placement: velocity-only
      purpose: Allow the 26.2 client to enter Frontier 1.21.11
      source: https://hangar.papermc.io/ViaVersion/ViaVersion/versions/5.11.0
      note: ViaBackwards is not required and remains forbidden.
    - name: TAB
      version: "6.1.0"
      channel: Release
      platform: Velocity
      status: installed-and-verified
      placement: velocity-only
      purpose: Global player list, header/footer, and server labels
      source: https://github.com/NEZNAMY/TAB/releases
      jar: manual-acquisition
      sha256: 14FE9601CE09F2EFE8A395EF2359DBF109A3572AA1B0B140B99C04B1B391D397
      installation: proxy
      display:
        header: Project Wayfarer
        footer: server, network online players, and player ping
      excluded-placement:
        - lobby
        - main
        - frontier
    - name: VelocityScoreboardAPI
      version: "2.1.0"
      channel: Release
      platform: Velocity
      status: installed-and-verified
      placement: velocity-only
      purpose: TAB scoreboard packet API on Velocity; baseline display uses header/footer only
      source: https://github.com/WiIIiam278/VelocityScoreboardAPI
      jar: manual-acquisition
      sha256: DBF3FB5BF9B153880362EE7C471D211147D3800ED6FF1352D128EFDBE8AFF05A
      excluded-placement:
        - lobby
        - main
        - frontier
    - name: Advanced Portals proxy component
      status: planned-not-installed
      purpose: Lobby/Main/Frontier physical server-switch portals
      source: https://modrinth.com/plugin/advanced-portals
      note: Follow the package documentation; the proxy component is distributed with the project files.
  optional:
    - name: spark standalone
      purpose: Velocity performance profiling
      source: https://spark.lucko.me/download
  provisional:
    - name: Cross-server chat
      purpose: Global chat with [LOBBY]/[MAIN]/[FRONTIER] origin tag
      action: Do not collect until the PoC candidate is selected.
  forbidden:
    - name: ViaBackwards
      reason: Old clients must not enter newer servers with incomplete item support.

all_paper_backends:
