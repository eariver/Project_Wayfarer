# Project Wayfarer Ver0.0.3
# Verify exact releases immediately before download.
# JARs, paid plugins, and paid content are obtained manually from official sources.

core_binaries:
  - name: Velocity
    target: velocity/
    required: true
    source: https://papermc.io/downloads/velocity
  - name: Paper 26.2
    target: servers/lobby/paper.jar and servers/main/paper.jar
    required: true
    java: 25
    source: https://papermc.io/downloads/paper
  - name: Paper 1.21.11
    target: servers/frontier/paper.jar
    required: true
    java: 25
    source: https://papermc.io/downloads/paper

velocity:
  required:
    - name: LuckPerms
      version: "5.5.60"
      channel: Release
      placement: velocity
      purpose: Network permission management
      source: https://luckperms.net/download
      storage: shared-mariadb
      database: wayfarer_luckperms
      messaging: sql
      policy: The only permission plugin; replacement requires an approved migration task.
    - name: ViaVersion
      version: "5.11.0"
      channel: Release
      placement: velocity-only
      purpose: Allow the 26.2 client to enter Frontier 1.21.11
      source: https://hangar.papermc.io/ViaVersion/ViaVersion/versions/5.11.0
      note: ViaBackwards is not required and remains forbidden.
    - name: TAB
      version: "6.1.0"
      channel: Release
      platform: Velocity
      status: installed-and-verified
      placement: velocity-only
      purpose: Global player list, header/footer, and server labels
      source: https://github.com/NEZNAMY/TAB/releases
      jar: manual-acquisition
      sha256: 14FE9601CE09F2EFE8A395EF2359DBF109A3572AA1B0B140B99C04B1B391D397
      installation: proxy
      display:
        header: Project Wayfarer
        footer: server, network online players, and player ping
      excluded-placement:
        - lobby
        - main
        - frontier
    - name: VelocityScoreboardAPI
      version: "2.1.0"
      channel: Release
      platform: Velocity
      status: installed-and-verified
      placement: velocity-only
      purpose: TAB scoreboard packet API on Velocity; baseline display uses header/footer only
      source: https://github.com/WiIIiam278/VelocityScoreboardAPI
      jar: manual-acquisition
      sha256: DBF3FB5BF9B153880362EE7C471D211147D3800ED6FF1352D128EFDBE8AFF05A
      excluded-placement:
        - lobby
        - main
        - frontier
    - name: Advanced Portals proxy component
      status: planned-not-installed
      purpose: Lobby/Main/Frontier physical server-switch portals
      source: https://modrinth.com/plugin/advanced-portals
      note: Follow the package documentation; the proxy component is distributed with the project files.
  optional:
    - name: spark standalone
      purpose: Velocity performance profiling
      source: https://spark.lucko.me/download
  provisional:
    - name: Cross-server chat
      purpose: Global chat with [LOBBY]/[MAIN]/[FRONTIER] origin tag
      action: Do not collect until the PoC candidate is selected.
  forbidden:
    - name: ViaBackwards
      reason: Old clients must not enter newer servers with incomplete item support.

all_paper_backends:
  required:
    - name: Multiverse-Core
      version: "5.7.2"
      channel: Release
      platform: Bukkit
      status: installed-and-verified
      placement:
        - lobby
        - main
        - frontier
      runtime-java: 25
      purpose: Manage each backend's existing worlds and Main's persistent/resource dimension families
      source: https://modrinth.com/plugin/multiverse-core
      jar: manual-acquisition
      sha256: 574862AA3062AF53957FE845DE110A386F886445366836C8C63712E11D697400
      world-registration:
        lobby:
          - runtime-key: minecraft:overworld
            logical-name: lobby
            multiverse-alias: ''
            existing: true
        main:
          - runtime-key: minecraft:overworld
            logical-name: main
            multiverse-alias: ''
            family: persistent
            existing: true
          - runtime-key: minecraft:the_nether
            logical-name: main_nether
            multiverse-alias: ''
            family: persistent
            existing: true
          - runtime-key: minecraft:the_end
            logical-name: main_end
            multiverse-alias: main_end
            family: persistent
            existing: true
          - runtime-key: minecraft:resource
            logical-name: resource
            multiverse-alias: ''
            family: resource
            existing: false
          - runtime-key: minecraft:resource_nether
            logical-name: resource_nether
            multiverse-alias: ''
            family: resource
            existing: false
          - runtime-key: minecraft:resource_end
            logical-name: resource_end
            multiverse-alias: ''
            family: resource
            existing: false
        frontier:
          - runtime-key: minecraft:overworld
            logical-name: frontier_gate
            multiverse-alias: ''
            existing: true
      excluded-placement:
        - velocity
    - name: LuckPerms
      version: "5.5.60"
      channel: Release
      placement:
        - lobby
        - main
        - frontier
      source: https://luckperms.net/download
      storage: shared-mariadb
      database: wayfarer_luckperms
      messaging: sql
      policy: The only permission plugin; replacement requires an approved migration task.
    - name: WorldEdit
      version: "7.4.4"
      reported-version: "7.4.4+7546-f9e033f"
      channel: Release
      platform: Bukkit
      status: installed-and-verified
      placement:
        - lobby
        - main
        - frontier
      runtime-java: 25
      purpose: Common Paper world administration
      jar: manual-acquisition
      sha256: 44C97EE6C1DF9AFA127DF3C5A2C6A7108F826FB44AB7B255A7EC4250FEB89B9D
      source: https://modrinth.com/plugin/worldedit/version/qNuPcliz
      excluded-placement:
        - velocity
    - name: WorldGuard
      version: "7.0.17"
      reported-version: "7.0.17+2370-e42d8bc"
      channel: Release
      platform: Bukkit
      status: installed-and-verified
      placement:
        - lobby
        - main
        - frontier
      runtime-java: 25
      purpose: Common Paper region management and entry-world protection
      required-dependency: "WorldEdit 7.4.4"
      builder-group: wayfarer_builder
      region-policy:
        lobby: protected-global
        main: installed-no-project-regions
        frontier: protected-global
      jar: manual-acquisition
      sha256: 3F14562509BF01E7680571B6F56932239157FF938F257C3226DF3B4088AE54F2
      source: https://modrinth.com/plugin/worldguard/version/pI4UHLJL
      excluded-placement:
        - velocity
    - name: PlaceholderAPI
      version: "2.12.3"
      channel: Release
      platform: Bukkit
      status: installed-and-verified
      placement:
        - lobby
        - main
        - frontier
      source: https://www.spigotmc.org/resources/placeholderapi.6245/
      jar: manual-acquisition
      sha256: FDE03259F5AF6938F3C33EEB4D814000A1ADABF1D2304CE14970BE81F609A437
      expansions: none-installed
      expansion-acquisition: manual-only
      cloud-enabled: false
      excluded-placement:
        - velocity
    - name: TAB-Bridge
      version: "6.2.2"
      channel: Release
      platform: Bukkit
      status: installed-and-verified
      placement:
        - lobby
        - main
        - frontier
      source: https://github.com/NEZNAMY/TAB-Bridge/releases
      purpose: Forward backend data and PlaceholderAPI values to proxy-installed TAB
      jar: manual-acquisition
      sha256: 0E5A8EABBBD5AC7FE6335AD2F7FDC2236FAFCF9A7840F18870F2538FFBEC47FF
      installation: proxy-bridge
      excluded-placement:
        - velocity
    - name: Advanced Portals backend component
      status: planned-not-installed
      source: https://modrinth.com/plugin/advanced-portals
  bundled:
    - name: spark
      note: Paper 1.21 and later bundles spark; a separate Paper JAR is not initially required.

lobby:
  required:
    - name: VoidGen
      version: "2.3.8"
      channel: Release
      status: installed-and-verified
      placement: servers/lobby/plugins
      world: lobby
      purpose: Generate the Lobby as a void world without unnecessary vanilla terrain.
      source: https://modrinth.com/plugin/voidgen/version/2.3.8
      safety_baseline:
        platform: 17x17 stone at Y=63 with a gold center block
        world_spawn: "0 64 0"
        keep_inventory: true
        respawn_radius: 0
        nether: disabled
        end: disabled
main:
  required:
    - name: Multiverse-NetherPortals
      version: "5.0.5"
      channel: Release
      platform: Bukkit
      status: installed-and-verified
      placement: main
      purpose: Link the Main and Resource dimension families correctly
      source: https://modrinth.com/plugin/multiverse-netherportals
      jar: manual-acquisition
      required-dependency: "Multiverse-Core 5.7.2"
      sha256: 7D6364A2B474C2D3C4F8F8C5DCD469D9DE5A5F6F64C43DA39B648C3877AD077D
      explicit-links:
        - minecraft:overworld <-> minecraft:the_nether
        - minecraft:overworld <-> minecraft:the_end
        - minecraft:resource <-> minecraft:resource_nether
        - minecraft:resource <-> minecraft:resource_end
      family-crossing: forbidden
      excluded-placement:
        - velocity
        - lobby
        - frontier
    - name: mcMMO
      version: "2.3.000"
      purpose: Activity-based shared leveling
      source: https://github.com/mcMMO-Dev/mcMMO
      distribution: local-maven-build
      status: jar-obtained-not-placed
      placement:
        - main
        - frontier
      note: Use the same untracked JAR on Main and Frontier; install later with shared MariaDB configuration.
    - name: EvenMoreFish
      status: planned-not-installed
      purpose: Custom fishing gameplay
      source: https://modrinth.com/plugin/evenmorefish
    - name: RedisEconomy
      status: planned-not-installed
      purpose: Main/Frontier shared Waymark balance
      source: https://www.spigotmc.org/resources/105965/
    - name: VaultUnlocked
      status: planned-not-installed
      purpose: Economy API bridge
      source: https://hangar.papermc.io/TNE/VaultUnlocked
    - name: EconomyShopGUI
      status: planned-not-installed
      purpose: Initial buy/sell shop
      source: https://www.curseforge.com/minecraft/bukkit-plugins/economyshopgui
    - name: BetterStructures
      status: planned-not-installed
      purpose: Dimension-specific structures in persistent Main worlds only
      source: https://modrinth.com/plugin/betterstructures
frontier:
  required:
    - name: VoidGen
      version: "2.3.8"
      channel: Release
      status: installed-and-verified
      placement: servers/frontier/plugins
      world: frontier_gate
      purpose: Generate the Frontier entry world as a void world without unnecessary vanilla terrain.
      source: https://modrinth.com/plugin/voidgen/version/2.3.8
      safety_baseline:
        platform: 17x17 stone at Y=63 with a gold center block
        world_spawn: "0 64 0"
        keep_inventory: true
        respawn_radius: 0
        nether: disabled
        end: disabled
    - name: mcMMO
      version: "2.3.000"
      purpose: Shared progression with Main
      source: https://github.com/mcMMO-Dev/mcMMO
      distribution: local-maven-build
      status: jar-obtained-not-placed
      placement:
        - main
        - frontier
      note: Use the same untracked JAR on Main and Frontier; install later with shared MariaDB configuration.
    - name: RedisEconomy
      status: planned-not-installed
      purpose: Shared Waymark balance
      source: https://www.spigotmc.org/resources/105965/
    - name: VaultUnlocked
      status: planned-not-installed
      purpose: Economy API bridge
      source: https://hangar.papermc.io/TNE/VaultUnlocked
    - name: EliteMobs
      status: planned-not-installed
      purpose: Ready-made mobs, equipment, quests, and Adventure worlds
      source: https://modrinth.com/plugin/elitemobs
  conditional:
    - name: BetterStructures
      status: planned-not-installed
      condition: Required by a selected Frontier content pack
      source: https://modrinth.com/plugin/betterstructures

administration_development:
  planned:
    - name: PlugManX
      version: unselected
      status: planned-not-installed
      platform: Bukkit/Paper
      placement:
        - lobby
        - main
        - frontier
      excluded-placement:
        - velocity
      acquisition: manual
      source: https://modrinth.com/plugin/plugmanx
      purpose: Admin-only management and short development cycles for verified reload-safe custom Plugins
      operational-policy: full-server-restart-default
      reload-policy: allowlist-only-after-plugin-specific-poc

content_policy:
  - Start with several ready-made themes requiring little customization.
  - EliteMobs content is obtained from its official project/vendor channels.
  - Main structures are selected separately for Overworld, Nether, and End.
  - Do not collect a literal Twilight Forest plugin.
  - Aether-like content remains a PoC candidate and is not an initial required download.
  - MythicMobs and LAB-specific plugins are not part of the initial collection.
