content_policy:
  - Start with several ready-made themes requiring little customization.
  - EliteMobs content is obtained from its official project/vendor channels.
  - Main structures are selected separately for Overworld, Nether, and End.
  - Do not collect a literal Twilight Forest plugin.
  - Aether-like content remains a PoC candidate and is not an initial required download.
  - MythicMobs and LAB-specific plugins are not part of the initial collection.
